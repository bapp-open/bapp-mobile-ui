stages:
  - analyze
  - test
  - sync

variables:
  PUB_CACHE: "$CI_PROJECT_DIR/.pub-cache"

.flutter_base:
  tags:
    - macos
  cache:
    key: flutter-pub-cache
    paths:
      - .pub-cache/
  before_script:
    - flutter pub get

analyze:
  extends: .flutter_base
  stage: analyze
  script:
    - flutter analyze
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

test:
  extends: .flutter_base
  stage: test
  needs: [analyze]
  script:
    - flutter test
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

publish:dry-run:
  extends: .flutter_base
  stage: test
  needs: [analyze]
  script:
    - git checkout -- example/
    - dart pub publish --dry-run
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ── Sync to GitHub ────────────────────────────────────────────────────────
# Mirrors main + version tags to github.com/bapp-open/bapp-mobile-ui, where a
# GitHub Actions workflow publishes the package to pub.dev on tag pushes.
# Requires the group-level CI/CD variable GITHUB_SSH_PRIVATE_KEY_B64
# (base64-encoded deploy key with write access to the GitHub mirror).

sync-github:
  stage: sync
  image: alpine:3.20
  before_script:
    - apk add --no-cache git openssh-client
    - mkdir -p ~/.ssh
    - echo "$GITHUB_SSH_PRIVATE_KEY_B64" | base64 -d > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan github.com >> ~/.ssh/known_hosts
    - git config --global user.name "bapp-open-bot"
    - git config --global user.email "bot@bapp.ro"
  script:
    - git clone --bare "$CI_REPOSITORY_URL" repo.git
    - cd repo.git
    - git push --mirror git@github.com:bapp-open/bapp-mobile-ui.git
  rules:
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_COMMIT_BRANCH == "main"'
