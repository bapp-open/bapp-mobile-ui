name: bapp_mobile_ui
description: Server-driven mobile UI renderer for the bapp_framework backend.
version: 0.1.0
homepage: https://www.bapp.ro
repository: https://github.com/bapp-open/bapp-mobile-ui
topics:
  - ui
  - flutter
  - server-driven-ui
environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.22.0'
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  bapp_api_client: ^0.5.0
  bapp_auth: ^0.2.1
  shared_preferences: ^2.2.3
  mobile_scanner: ^7.2.0
  nfc_manager: ^4.0.0
  connectivity_plus: ^7.1.1
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  http: ^1.1.0
flutter:
  generate: true
